<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ZEC Predictor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06080c;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px)}

/* ── HEADER ── */
.header{text-align:center;padding:20px 16px 12px}
.header .symbol{font-size:11px;letter-spacing:3px;opacity:.35;text-transform:uppercase;font-weight:600}
.header .price-row{display:flex;align-items:baseline;justify-content:center;gap:8px;margin:4px 0}
.header .price-main{font-size:38px;font-weight:800;letter-spacing:-1px;transition:color .4s}
.header .price-change{font-size:14px;font-weight:600;padding:2px 7px;border-radius:5px}
.header .price-change.up{background:#00e67622;color:#00e676}
.header .price-change.down{background:#ff525222;color:#ff5252}

/* ── FINAL VERDICT ── */
.verdict-box{margin:0 16px 12px;padding:16px;border-radius:14px;text-align:center;
  border:2px solid #222;transition:all .4s}
.verdict-box.buy{border-color:#00e67666;background:#00e67610}
.verdict-box.sell{border-color:#ff525266;background:#ff525210}
.verdict-box.hold{border-color:#ffeb3b44;background:#ffeb3b08}
.verdict-dir{font-size:28px;font-weight:900;letter-spacing:2px}
.verdict-dir.buy{color:#00e676}
.verdict-dir.sell{color:#ff5252}
.verdict-dir.hold{color:#ffeb3b}
.verdict-conf{font-size:13px;opacity:.5;margin-top:2px;font-weight:500}
.verdict-reason{font-size:11px;opacity:.4;margin-top:6px;line-height:1.4}

/* ── WARNING ── */
.warning-bar{display:none;margin:0 16px 10px;padding:10px 14px;border-radius:10px;
  background:#ff980022;border:1px solid #ff980044;animation:pulse 2s infinite}
.warning-bar.active{display:flex;align-items:center;gap:8px}
.warning-bar .warn-icon{font-size:18px;flex-shrink:0}
.warning-bar .warn-text{font-size:12px;font-weight:600;color:#ffab40;line-height:1.3}
.warning-bar.reversal-up{background:#00e67618;border-color:#00e67644}
.warning-bar.reversal-up .warn-text{color:#69f0ae}
.warning-bar.reversal-down{background:#ff174418;border-color:#ff174444}
.warning-bar.reversal-down .warn-text{color:#ff8a80}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* ── TIMEFRAME BUTTONS (the main grid) ── */
.tf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 10px}
.tf-btn{position:relative;padding:14px 8px;border-radius:12px;text-align:center;
  border:1.5px solid #1a1f2e;background:#0d1017;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all .2s;user-select:none}
.tf-btn:active{transform:scale(0.95)}
.tf-btn.active{border-color:#4fc3f7;box-shadow:0 0 10px #4fc3f722}
.tf-btn.buy{border-color:#00e67644;background:#00e67608}
.tf-btn.sell{border-color:#ff525244;background:#ff525208}
.tf-btn.hold{border-color:#ffeb3b33;background:#ffeb3b06}
.tf-label{font-size:11px;opacity:.4;font-weight:600;letter-spacing:1px}
.tf-dir{font-size:18px;font-weight:900;letter-spacing:1px;margin:4px 0 2px}
.tf-dir.buy{color:#00e676}
.tf-dir.sell{color:#ff5252}
.tf-dir.hold{color:#ffeb3b}
.tf-conf{font-size:11px;opacity:.4;font-weight:600}
.tf-countdown{font-size:9px;opacity:.3;margin-top:4px;font-variant-numeric:tabular-nums;font-weight:500}

/* ── PRICE TARGETS (compact) ── */
.targets{margin:0 16px 10px;padding:12px;border-radius:12px;background:#0d1017;border:1px solid #141820}
.targets-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.targets-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.3;font-weight:600}
.targets-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.target-pill{text-align:center;padding:8px;border-radius:8px}
.target-pill.high{background:#00e67610;border:1px solid #00e67622}
.target-pill.low{background:#ff525210;border:1px solid #ff525222}
.tp-label{font-size:9px;opacity:.4;text-transform:uppercase;letter-spacing:.5px}
.tp-price{font-size:16px;font-weight:800;margin:2px 0}
.tp-pct{font-size:11px;font-weight:600}
.target-pill.high .tp-price,.target-pill.high .tp-pct{color:#00e676}
.target-pill.low .tp-price,.target-pill.low .tp-pct{color:#ff5252}

/* ── DETAIL SECTION ── */
.detail-toggle{display:block;width:calc(100% - 32px);margin:0 auto 10px;padding:10px;
  background:#0d1017;border:1px solid #141820;border-radius:10px;color:#4fc3f7;
  font-size:12px;font-weight:600;cursor:pointer;text-align:center;letter-spacing:.5px}
.detail-toggle:active{background:#111520}
.detail-panel{display:none;padding:0 16px 10px}
.detail-panel.open{display:block}
.detail-card{background:#0d1017;border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid #141820}
.detail-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.3;font-weight:600;margin-bottom:8px}
.agent-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #111520}
.agent-row:last-child{border:none}
.agent-left{display:flex;align-items:center;gap:6px}
.agent-emoji{font-size:14px}
.agent-name{font-size:12px;font-weight:500;opacity:.7}
.agent-signal{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.agent-signal.buy{background:#00e67618;color:#00e676}
.agent-signal.sell{background:#ff525218;color:#ff5252}
.agent-signal.hold{background:#ffeb3b18;color:#ffeb3b}

/* ── FEAR & GREED COMPACT ── */
.fg-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.fg-bar{flex:1;height:6px;border-radius:3px;background:linear-gradient(90deg,#ff5252,#ff9800,#ffeb3b,#69f0ae,#00e676);position:relative}
.fg-needle{position:absolute;top:-2px;width:3px;height:10px;border-radius:1px;background:#fff;box-shadow:0 0 4px #fff8;transition:left .4s}
.fg-val{font-size:12px;font-weight:700;min-width:24px;text-align:right}
.fg-mood{font-size:10px;font-weight:600;opacity:.6;min-width:40px}

.updated-footer{text-align:center;padding:8px;font-size:9px;opacity:.2;letter-spacing:.5px}
.loading{text-align:center;padding:40px 20px;opacity:.3;font-size:13px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="symbol">Zcash ZEC / USDT</div>
  <div class="price-row">
    <div class="price-main" id="price">--</div>
    <div class="price-change up" id="change">--</div>
  </div>
</div>

<!-- FINAL VERDICT -->
<div class="verdict-box" id="verdict">
  <div class="verdict-dir" id="verdictDir">LOADING</div>
  <div class="verdict-conf" id="verdictConf">Analyzing market...</div>

</div>

<!-- WARNING -->
<div class="warning-bar" id="warningBar">
  <div class="warn-icon" id="warnIcon"></div>
  <div class="warn-text" id="warnText"></div>
</div>

<!-- TIMEFRAME BUTTONS -->
<div class="tf-grid" id="tfGrid"></div>

<!-- PRICE TARGETS -->
<div class="targets" id="targets">
  <div class="targets-header">
    <span class="targets-title">Price Targets</span>
  </div>
  <div class="targets-row">
    <div class="target-pill high">
      <div class="tp-label">Can Go Up To</div>
      <div class="tp-price" id="tpHigh">--</div>
      <div class="tp-pct" id="tpHighPct">--</div>
    </div>
    <div class="target-pill low">
      <div class="tp-label">Can Drop To</div>
      <div class="tp-price" id="tpLow">--</div>

    </div>
  </div>
</div>

<!-- SHOW/HIDE DETAILS -->
<button class="detail-toggle" id="detailToggle">Show Details (9 Indicators + 8 Agents)</button>
<div class="detail-panel" id="detailPanel">
  <div class="detail-card">
    <div class="detail-title">Swarm Agents</div>
    <div id="agentList"></div>
  </div>
  <div class="detail-card">
    <div class="detail-title">Technical Indicators</div>
    <div id="indicatorList"></div>
  </div>
  <div class="detail-card">
    <div class="detail-title">Market Fear & Greed</div>
    <div class="fg-row">
      <span class="fg-mood" id="fgMood">--</span>
      <div class="fg-bar"><div class="fg-needle" id="fgNeedle" style="left:50%"></div></div>
      <span class="fg-val" id="fgVal">--</span>
    </div>
  </div>
</div>

<div class="updated-footer" id="updated">Loading...</div>

<script>
// ════════════════════════════════════════
//  ZEC UNIFIED PREDICTION ENGINE
//  Single consensus from 9 indicators +
//  8 swarm agents + fear/greed
// ════════════════════════════════════════

const SYMBOL = 'ZECUSDT';
const TIMEFRAMES = ['15m','1h','4h','1d','1w','1M'];
const TF_DISPLAY = {'15m':'15m','1h':'1H','4h':'4H','1d':'1D','1w':'1W','1M':'1M'};
const REFRESH_MS = {'15m':20000,'1h':45000,'4h':120000,'1d':300000,'1w':600000,'1M':600000};
const TF_SECONDS = {'15m':900,'1h':3600,'4h':14400,'1d':86400,'1w':604800,'1M':2592000};
let activeTF = '15m';
let cache = {};
let insideAnalyze = false;

// ── BINANCE API ──
async function fetchCandles(tf, limit=200) {
  const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${SYMBOL}&interval=${tf}&limit=${limit}`);
  if (!r.ok) throw new Error(`API ${r.status}`);
  return (await r.json()).map(c => ({
    time:c[0], open:+c[1], high:+c[2], low:+c[3], close:+c[4], volume:+c[5]
  }));
}

// ══════════════════════════
//  TECHNICAL INDICATORS
// ══════════════════════════

function ema(d,p){const k=2/(p+1),r=[d[0]];for(let i=1;i<d.length;i++)r.push(d[i]*k+r[i-1]*(1-k));return r}
function sma(d,p){const r=[];for(let i=0;i<d.length;i++){if(i<p-1){r.push(null);continue}let s=0;for(let j=i-p+1;j<=i;j++)s+=d[j];r.push(s/p)}return r}

function calcRSI(c,p=14){const g=[],l=[];for(let i=1;i<c.length;i++){const d=c[i]-c[i-1];g.push(d>0?d:0);l.push(d<0?-d:0)}
let ag=g.slice(0,p).reduce((a,b)=>a+b,0)/p,al=l.slice(0,p).reduce((a,b)=>a+b,0)/p;
const r=new Array(p).fill(null);r.push(al===0?100:100-100/(1+ag/al));
for(let i=p;i<g.length;i++){ag=(ag*(p-1)+g[i])/p;al=(al*(p-1)+l[i])/p;r.push(al===0?100:100-100/(1+ag/al))}return r}

function calcMACD(c){const e12=ema(c,12),e26=ema(c,26),ml=e12.map((v,i)=>v-e26[i]),sig=ema(ml,9);
return{macdLine:ml,signal:sig,histogram:ml.map((v,i)=>v-sig[i])}}

function calcBB(c,p=20,m=2){const mid=sma(c,p),u=[],l=[];
for(let i=0;i<c.length;i++){if(mid[i]===null){u.push(null);l.push(null);continue}
let s=0;for(let j=i-p+1;j<=i;j++)s+=(c[j]-mid[i])**2;const std=Math.sqrt(s/p);
u.push(mid[i]+m*std);l.push(mid[i]-m*std)}return{upper:u,mid,lower:l}}

function calcMFI(candles,p=14){const tp=candles.map(c=>(c.high+c.low+c.close)/3);
const rf=tp.map((t,i)=>t*candles[i].volume);const mfi=new Array(p+1).fill(null);
for(let i=p+1;i<tp.length;i++){let pos=0,neg=0;
for(let j=i-p+1;j<=i;j++){if(tp[j]>tp[j-1])pos+=rf[j];else if(tp[j]<tp[j-1])neg+=rf[j]}
mfi.push(100-(100/(1+(neg===0?100:pos/neg))))}return mfi}

function calcOBV(candles){const o=[0];for(let i=1;i<candles.length;i++){
if(candles[i].close>candles[i-1].close)o.push(o[i-1]+candles[i].volume);
else if(candles[i].close<candles[i-1].close)o.push(o[i-1]-candles[i].volume);
else o.push(o[i-1])}return o}

function calcADX(candles,p=14){if(candles.length<p*2+1)return{adx:new Array(candles.length).fill(null),pdi:[],ndi:[]};
const tr=[],dp=[],dm=[];for(let i=1;i<candles.length;i++){const h=candles[i].high,l=candles[i].low,pc=candles[i-1].close;
tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));const u=h-candles[i-1].high,d=candles[i-1].low-l;
dp.push(u>d&&u>0?u:0);dm.push(d>u&&d>0?d:0)}
const sm=a=>{const r=[a.slice(0,p).reduce((x,y)=>x+y,0)];for(let i=p;i<a.length;i++)r.push(r[r.length-1]-r[r.length-1]/p+a[i]);return r};
const sTR=sm(tr),sDMP=sm(dp),sDMM=sm(dm);
const pdi=sTR.map((t,i)=>t===0?0:(sDMP[i]/t)*100),ndi=sTR.map((t,i)=>t===0?0:(sDMM[i]/t)*100);
const dx=pdi.map((p2,i)=>(p2+ndi[i])===0?0:Math.abs(p2-ndi[i])/(p2+ndi[i])*100);
const adx=[dx.slice(0,p).reduce((a,b)=>a+b,0)/p];
for(let i=p;i<dx.length;i++)adx.push((adx[adx.length-1]*(p-1)+dx[i])/p);
const pad=candles.length-adx.length;
return{adx:new Array(pad).fill(null).concat(adx),pdi:new Array(pad).fill(null).concat(pdi),ndi:new Array(pad).fill(null).concat(ndi)}}

function calcVWAP(candles,lb=20){const e=candles.length,s=Math.max(0,e-lb);let cv=0,cvo=0;
for(let i=s;i<e;i++){cv+=(candles[i].high+candles[i].low+candles[i].close)/3*candles[i].volume;cvo+=candles[i].volume}
return cvo===0?candles[e-1].close:cv/cvo}

// ── PRICE TARGETS ──
function calcTargets(candles, price, adxVal, bb) {
  const L = candles.length - 1;
  let atrSum = 0;
  for (let i = Math.max(1, L-13); i <= L; i++) {
    const h=candles[i].high,l=candles[i].low,pc=candles[i-1].close;
    atrSum += Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
  }
  const atr = atrSum / 14;
  const str = adxVal > 25 ? 1.2 : 1.0;
  const bbU = bb.upper[L] || price + atr;
  const bbL = bb.lower[L] || price - atr;

  // Find swing highs/lows
  const recent = candles.slice(Math.max(0, L-50));
  const rH = Math.max(...recent.map(c=>c.high));
  const rL = Math.min(...recent.map(c=>c.low));
  const fibR = rH - rL;

  const up = ((price + atr*1.5 + price + fibR*0.618 + bbU) / 3) * (0.97 + str*0.03);
  const down = ((price - atr*1.5 + price - fibR*0.618 + bbL) / 3) * (1.03 - str*0.03);

  return {
    high: Math.max(price * 1.003, up),
    low: Math.min(price * 0.997, down),
    highPct: ((Math.max(price*1.003,up) - price) / price * 100),
    lowPct: ((Math.min(price*0.997,down) - price) / price * 100)
  };
}

// ══════════════════════════════════════
//  SWARM AGENTS (8 virtual traders)
// ══════════════════════════════════════

const AGENTS = [
  { name:'Trend Rider', emoji:'🏄', w:0.15 },
  { name:'MACD Hunter', emoji:'🎯', w:0.14 },
  { name:'Value Scout', emoji:'🔍', w:0.12 },
  { name:'Whale Tracker', emoji:'🐋', w:0.16 },
  { name:'Vol Sniper', emoji:'💥', w:0.10 },
  { name:'Trend Judge', emoji:'⚖️', w:0.12 },
  { name:'Volume Oracle', emoji:'📊', w:0.09 },
  { name:'Meta Agent', emoji:'🧠', w:0.12 }
];

function runAgents(ind) {
  const {ema9,ema21,ema50,ema9P,ema21P,rsi,mfi,macdH,macdHP,macdL,bbU,bbL,bbM,price,adx,pdi,ndi,obvUp,volR,vwapD} = ind;
  const results = [];

  // 1. Trend Rider - EMA cross
  const sp=(ema9-ema21)/ema21*100;
  results.push({score: Math.max(-1,Math.min(1,sp/1.5*(price>ema50?1.2:0.9)))});

  // 2. MACD Hunter
  const acc=macdH-macdHP;
  results.push({score: Math.max(-1,Math.min(1,(macdH/Math.abs(macdL||1))+(acc>0?0.2:-0.2)))});

  // 3. Value Scout (RSI mean reversion)
  results.push({score: rsi<25?0.9:rsi<35?0.5:rsi>75?-0.9:rsi>65?-0.5:(50-rsi)/50*0.3});

  // 4. Whale Tracker (MFI + OBV)
  results.push({score: Math.max(-1,Math.min(1,((mfi-50)/50)*0.6+(obvUp?0.4:-0.4)))});

  // 5. Vol Sniper (Bollinger)
  if(bbU&&bbL&&bbM){const pos=(price-bbL)/(bbU-bbL);const sq=(bbU-bbL)/bbM<0.03;
    results.push({score:sq?(ema9>ema21?0.3:-0.3):pos>0.95?-0.7:pos<0.05?0.7:-(pos-0.5)*1.2})}
  else results.push({score:0});

  // 6. Trend Judge (ADX)
  results.push({score: adx<20?0:(pdi>ndi?1:-1)*Math.min(1,adx/35)});

  // 7. Volume Oracle (VWAP + volume)
  const volBias=volR>1.5?(ema9>ema21?0.4:-0.4):0;
  results.push({score: Math.max(-1,Math.min(1,vwapD*12+volBias))});

  // 8. Meta Agent (cross-TF)
  let mtfScore=0,mtfCount=0;
  for(const tf of TIMEFRAMES){if(cache[tf]){
    const c=cache[tf].map(x=>x.close),cL=c.length-1;
    if(cL>26){const e9=ema(c,9),e21=ema(c,21);mtfScore+=(e9[cL]-e21[cL])/e21[cL]*50;mtfCount++}}}
  results.push({score: mtfCount>=2?Math.max(-1,Math.min(1,mtfScore/mtfCount*2)):0});

  return results.map((r,i) => ({
    ...AGENTS[i],
    score: Math.max(-1,Math.min(1,r.score)),
    vote: r.score>0.15?'BUY':r.score<-0.15?'SELL':'HOLD',
    cls: r.score>0.15?'buy':r.score<-0.15?'sell':'hold'
  }));
}

// ── FEAR & GREED ──
function calcFG(rsi,mfi,volR,adx,chg){
  let fg=50+(rsi-50)*0.3+(mfi-50)*0.25+Math.min(15,Math.max(-15,(volR-1)*15))+(adx>25?8:0)+Math.min(10,Math.max(-10,chg*2));
  fg=Math.max(0,Math.min(100,Math.round(fg)));
  const mood=fg<=15?'EXTREME FEAR':fg<=35?'FEAR':fg<=55?'NEUTRAL':fg<=75?'GREED':'EXTREME GREED';
  const color=fg<=15?'#ff5252':fg<=35?'#ff9800':fg<=55?'#ffeb3b':fg<=75?'#69f0ae':'#00e676';
  return {value:fg,mood,color};
}

// ══════════════════════════════════════
//  UNIFIED ANALYZE — ONE FINAL RESULT
// ══════════════════════════════════════

function analyze(candles) {
  insideAnalyze = true;
  const closes=candles.map(c=>c.close), volumes=candles.map(c=>c.volume), L=closes.length-1, price=closes[L];
  const ema9=ema(closes,9),ema21=ema(closes,21),ema50=ema(closes,50);
  const rsi=calcRSI(closes),rsiVal=rsi[rsi.length-1]||50;
  const macd=calcMACD(closes);
  const bb=calcBB(closes);
  const mfi=calcMFI(candles),mfiVal=mfi[mfi.length-1]||50;
  const obv=calcOBV(candles),obvSma=sma(obv,20);
  const adxD=calcADX(candles),adxVal=adxD.adx[L]||20,pdi=adxD.pdi[L]||0,ndi=adxD.ndi[L]||0;
  const vwap=calcVWAP(candles),volSma=sma(volumes,20);
  const obvUp=obv[L]>(obvSma[L]||obv[L]);
  const volR=volSma[L]?volumes[L]/volSma[L]:1;

  // ── 9 Technical indicator scores [-1,+1] ──
  const factors = [];
  const emaSp=(ema9[L]-ema21[L])/ema21[L]*100;
  factors.push({n:'EMA Trend',s:Math.max(-1,Math.min(1,emaSp/2)),w:0.15});
  const hN=macd.histogram[L],hP=macd.histogram[L-1];
  factors.push({n:'MACD',s:Math.max(-1,Math.min(1,(hN/Math.abs(macd.macdLine[L]||1))+(hN-hP>0?0.15:-0.15))),w:0.15});
  factors.push({n:'RSI',s:Math.max(-1,Math.min(1,((rsiVal-50)/50)*1.5)),w:0.12});
  factors.push({n:'Money Flow',s:Math.max(-1,Math.min(1,((mfiVal-50)/50)*1.5)),w:0.15});
  const obvD=obvSma[L]?((obv[L]-obvSma[L])/Math.abs(obvSma[L])):0;
  factors.push({n:'OBV',s:Math.max(-1,Math.min(1,obvD*5)),w:0.10});
  const td=ema9[L]>ema21[L]?1:-1;
  factors.push({n:'Volume',s:volR>1.5?0.8*td:volR>1.2?0.4*td:0,w:0.08});
  let bbN=0;if(bb.mid[L]&&bb.upper[L]&&bb.lower[L]){const bw=bb.upper[L]-bb.lower[L];
    bbN=bw===0?0:-((price-bb.mid[L])/(bw/2))*0.8;bbN=Math.max(-1,Math.min(1,bbN))}
  factors.push({n:'Bollinger',s:bbN,w:0.10});
  const adxS=adxVal>25?(pdi>ndi?1:-1)*Math.min(adxVal/30,1.5)*0.7:0;
  factors.push({n:'ADX',s:Math.max(-1,Math.min(1,adxS)),w:0.10});
  factors.push({n:'VWAP',s:Math.max(-1,Math.min(1,((price-vwap)/vwap)*20)),w:0.05});

  // ── Technical composite score ──
  let techScore=0;for(const f of factors)techScore+=f.s*f.w;

  // ── Swarm agent scores ──
  insideAnalyze = false;
  const ind={ema9:ema9[L],ema21:ema21[L],ema50:ema50[L],ema9P:ema9[L-1],ema21P:ema21[L-1],
    rsi:rsiVal,mfi:mfiVal,macdH:hN,macdHP:hP,macdL:macd.macdLine[L],
    bbU:bb.upper[L],bbL:bb.lower[L],bbM:bb.mid[L],price,adx:adxVal,pdi,ndi,
    obvUp,volR,vwapD:(price-vwap)/vwap};
  const agents=runAgents(ind);
  let swarmW=0,swarmS=0;
  for(const a of agents){swarmS+=a.score*a.w;swarmW+=a.w}
  const swarmScore=swarmW>0?swarmS/swarmW:0;

  // ── Fear & Greed ──
  const prevClose=candles[Math.max(0,L-1)].close;
  const change=((price-prevClose)/prevClose*100);
  const fg=calcFG(rsiVal,mfiVal,volR,adxVal,change);

  // ══════════════════════════════════════════
  //  FINAL UNIFIED SCORE
  //  60% technical + 30% swarm + 10% sentiment
  // ══════════════════════════════════════════
  const sentimentBias = (fg.value - 50) / 100; // -0.5 to +0.5
  const finalScore = techScore * 0.60 + swarmScore * 0.30 + sentimentBias * 0.10;

  // Convert to confidence
  let bullish = ((finalScore + 1) / 2) * 100;
  bullish = Math.max(2, Math.min(98, bullish));

  let dir, cls, conf;
  if (bullish >= 58) { dir='BUY'; cls='buy'; conf=Math.round(bullish); }
  else if (bullish <= 42) { dir='SELL'; cls='sell'; conf=Math.round(100-bullish); }
  else { dir='HOLD'; cls='hold'; conf=Math.round(50+Math.abs(bullish-50)); }

  // ── Warning detection ──
  let warning = null;
  const emaCU=ema9[L]>ema21[L]&&ema9[L-1]<=ema21[L-1];
  const emaCDown=ema9[L]<ema21[L]&&ema9[L-1]>=ema21[L-1];
  const macdCU=hN>0&&hP<=0, macdCD=hN<0&&hP>=0;
  const bbSq=bb.upper[L]&&bb.lower[L]&&((bb.upper[L]-bb.lower[L])/bb.mid[L]<0.03);
  if(emaCU||macdCU) warning={type:'reversal-up',icon:'🔺',text:`TREND SHIFT UP${emaCU?' — EMA Cross':''}${macdCU?' — MACD Cross':''}`};
  else if(emaCDown||macdCD) warning={type:'reversal-down',icon:'🔻',text:`TREND SHIFT DOWN${emaCDown?' — EMA Cross':''}${macdCD?' — MACD Cross':''}`};
  else if(mfiVal>82) warning={type:'reversal-down',icon:'⚠️',text:`OVERBOUGHT — MFI at ${mfiVal.toFixed(0)}`};
  else if(mfiVal<18) warning={type:'reversal-up',icon:'⚠️',text:`OVERSOLD — MFI at ${mfiVal.toFixed(0)}`};
  else if(bbSq) warning={type:'',icon:'💥',text:'VOLATILITY SQUEEZE — Breakout imminent'};

  // ── Price targets ──
  const targets = calcTargets(candles, price, adxVal, bb);

  // ── Build reason string ──
  const buyAgents=agents.filter(a=>a.vote==='BUY').length;
  const sellAgents=agents.filter(a=>a.vote==='SELL').length;
  const topFactor=factors.reduce((a,b)=>Math.abs(b.s)>Math.abs(a.s)?b:a);
  const reason=`${buyAgents} agents buy, ${sellAgents} sell · Strongest: ${topFactor.n} · F&G: ${fg.mood}`;

  return { price, dir, cls, conf, factors, agents, fg, warning, targets, change, reason,
    ohlc:{o:candles[L].open,h:candles[L].high,l:candles[L].low,c:candles[L].close} };
}

// ══════════════
//  RENDER
// ══════════════

function render(result) {
  // Price
  document.getElementById('price').textContent = `$${result.price.toFixed(2)}`;
  document.getElementById('price').style.color = result.cls==='buy'?'#00e676':result.cls==='sell'?'#ff5252':'#ccc';
  const chgEl=document.getElementById('change');
  chgEl.textContent=`${result.change>=0?'+':''}${result.change.toFixed(2)}%`;
  chgEl.className=`price-change ${result.change>=0?'up':'down'}`;

  // Verdict
  const vBox=document.getElementById('verdict');
  vBox.className=`verdict-box ${result.cls}`;
  const vDir=document.getElementById('verdictDir');
  vDir.textContent=result.dir;
  vDir.className=`verdict-dir ${result.cls}`;
  document.getElementById('verdictConf').textContent=`${result.conf}% confidence`;
  document.getElementById('verdictReason').textContent=result.reason;

  // Warning
  const wBar=document.getElementById('warningBar');
  if(result.warning){wBar.className=`warning-bar active ${result.warning.type}`;
    document.getElementById('warnIcon').textContent=result.warning.icon;
    document.getElementById('warnText').textContent=result.warning.text;
  } else wBar.className='warning-bar';

  // Price targets
  document.getElementById('tpHigh').textContent=`$${result.targets.high.toFixed(2)}`;
  document.getElementById('tpHighPct').textContent=`+${result.targets.highPct.toFixed(1)}%`;
  document.getElementById('tpLow').textContent=`$${result.targets.low.toFixed(2)}`;
  document.getElementById('tpLowPct').textContent=`${result.targets.lowPct.toFixed(1)}%`;

  // Agents detail
  document.getElementById('agentList').innerHTML=result.agents.map(a=>
    `<div class="agent-row"><div class="agent-left"><span class="agent-emoji">${a.emoji}</span><span class="agent-name">${a.name}</span></div><span class="agent-signal ${a.cls}">${a.vote}</span></div>`).join('');

  // Indicators detail
  document.getElementById('indicatorList').innerHTML=result.factors.map(f=>{
    const sig=f.s>0.1?'buy':f.s<-0.1?'sell':'hold';
    return `<div class="agent-row"><div class="agent-left"><span class="agent-name">${f.n}</span></div><span class="agent-signal ${sig}">${sig.toUpperCase()}</span></div>`}).join('');

  // Fear & Greed
  document.getElementById('fgMood').textContent=result.fg.mood;
  document.getElementById('fgMood').style.color=result.fg.color;
  document.getElementById('fgNeedle').style.left=`${result.fg.value}%`;
  document.getElementById('fgVal').textContent=result.fg.value;
  document.getElementById('fgVal').style.color=result.fg.color;

  document.getElementById('updated').textContent=`Updated: ${new Date().toLocaleTimeString()}`;
}

// ══════════════════════════════
//  TIMEFRAME BUTTONS + COUNTDOWN
// ══════════════════════════════

function buildTFGrid() {
  const grid = document.getElementById('tfGrid');
  grid.innerHTML = '';
  for (const tf of TIMEFRAMES) {
    const btn = document.createElement('div');
    btn.className = `tf-btn${tf===activeTF?' active':''}`;
    btn.dataset.tf = tf;
    btn.innerHTML = `<div class="tf-label">${TF_DISPLAY[tf]}</div><div class="tf-dir hold" id="dir-${tf}">...</div><div class="tf-conf" id="conf-${tf}">--</div><div class="tf-countdown" id="cd-${tf}">--:--</div>`;
    btn.addEventListener('click', () => switchTF(tf));
    grid.appendChild(btn);

    // Fetch data for each button
    fetchCandles(tf, 200).then(candles => {
      cache[tf] = candles;
      const r = analyze(candles);
      btn.classList.remove('buy','sell','hold');
      btn.classList.add(r.cls);
      document.getElementById(`dir-${tf}`).textContent = r.dir;
      document.getElementById(`dir-${tf}`).className = `tf-dir ${r.cls}`;
      document.getElementById(`conf-${tf}`).textContent = `${r.conf}%`;
      if (tf === activeTF) render(r);
    }).catch(() => {});
  }
}

function switchTF(tf) {
  activeTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === tf));
  // Re-render from cache if available
  if (cache[tf]) {
    const r = analyze(cache[tf]);
    render(r);
  }
  refresh();
  clearInterval(autoTimer);
  autoTimer = setInterval(refresh, REFRESH_MS[tf]);
}

// ── Countdown on each button ──
function updateCountdowns() {
  const now = Date.now();
  for (const tf of TIMEFRAMES) {
    const el = document.getElementById(`cd-${tf}`);
    if (!el) continue;
    const intMs = TF_SECONDS[tf] * 1000;
    const remaining = intMs - (now % intMs);
    const s = Math.floor(remaining/1000);
    const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),sec=s%60;
    const pad=n=>String(n).padStart(2,'0');
    el.textContent = d>0?`${d}d ${pad(h)}:${pad(m)}`:h>0?`${pad(h)}:${pad(m)}:${pad(sec)}`:`${pad(m)}:${pad(sec)}`;
  }
}

// ── Auto refresh ──
let autoTimer;
async function refresh() {
  try {
    const candles = await fetchCandles(activeTF);
    cache[activeTF] = candles;
    const r = analyze(candles);
    render(r);
    // Update the button too
    const btn = document.querySelector(`.tf-btn[data-tf="${activeTF}"]`);
    if (btn) {
      btn.classList.remove('buy','sell','hold');
      btn.classList.add(r.cls);
      document.getElementById(`dir-${activeTF}`).textContent = r.dir;
      document.getElementById(`dir-${activeTF}`).className = `tf-dir ${r.cls}`;
      document.getElementById(`conf-${activeTF}`).textContent = `${r.conf}%`;
    }
  } catch(e) {
    document.getElementById('updated').textContent = `Error: ${e.message} — retrying...`;
    setTimeout(refresh, 8000);
  }
}

// ── Detail toggle ──
document.getElementById('detailToggle').addEventListener('click', function() {
  const panel = document.getElementById('detailPanel');
  const open = panel.classList.toggle('open');
  this.textContent = open ? 'Hide Details' : 'Show Details (9 Indicators + 8 Agents)';
});

// ── INIT ──
buildTFGrid();
setInterval(updateCountdowns, 1000);
updateCountdowns();
autoTimer = setInterval(refresh, REFRESH_MS[activeTF]);

// Re-fetch all when coming back to app
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { buildTFGrid(); refresh(); }
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>

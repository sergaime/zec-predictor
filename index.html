<!DOCTYPE html>
<html lang="en">
<head>

<title>ZEC Predictor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06080c;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px)}

/* ── PREDICTION HUB ── */
.prediction-hub{text-align:center;padding:24px 16px 16px;position:relative}
.prediction-hub .symbol{font-size:13px;letter-spacing:3px;opacity:.4;text-transform:uppercase;font-weight:600}
.prediction-hub .price-row{display:flex;align-items:baseline;justify-content:center;gap:10px;margin:6px 0}
.prediction-hub .price-main{font-size:44px;font-weight:800;letter-spacing:-1px;transition:color .4s}
.prediction-hub .price-change{font-size:15px;font-weight:600;padding:3px 8px;border-radius:6px}
.prediction-hub .price-change.up{background:#00e67622;color:#00e676}
.prediction-hub .price-change.down{background:#ff525222;color:#ff5252}

/* ── THE BIG PREDICTION CIRCLE ── */
.prediction-circle{margin:20px auto 10px;width:180px;height:180px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;transition:all .5s}
.prediction-circle::before{content:'';position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(var(--ring-color) calc(var(--ring-pct) * 1%), #1a1a1a 0);
  z-index:0;transition:all .6s}
.prediction-circle::after{content:'';position:absolute;inset:3px;border-radius:50%;
  background:#0d1017;z-index:1}
.prediction-circle .inner{position:relative;z-index:2;text-align:center}
.prediction-circle .pct{font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1}
.prediction-circle .direction{font-size:16px;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.prediction-circle .confidence-label{font-size:10px;opacity:.4;margin-top:4px;letter-spacing:1px}

/* ── TREND WARNING ── */
.warning-bar{display:none;margin:0 16px 10px;padding:12px 16px;border-radius:12px;
  background:#ff980022;border:1px solid #ff980044;
  animation:warningPulse 2s infinite}
.warning-bar.active{display:flex;align-items:center;gap:10px}
.warning-bar .warn-icon{font-size:22px;flex-shrink:0}
.warning-bar .warn-text{font-size:13px;font-weight:600;color:#ffab40;line-height:1.3}
.warning-bar .warn-sub{font-size:11px;opacity:.6;color:#ffab40;margin-top:2px}
.warning-bar.reversal-up{background:#00e67618;border-color:#00e67644}
.warning-bar.reversal-up .warn-text,.warning-bar.reversal-up .warn-sub{color:#69f0ae}
.warning-bar.reversal-down{background:#ff174418;border-color:#ff174444}
.warning-bar.reversal-down .warn-text,.warning-bar.reversal-down .warn-sub{color:#ff8a80}
@keyframes warningPulse{0%,100%{opacity:1}50%{opacity:.7}}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid #141820;background:#0a0d12;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs button{flex:1;min-width:55px;padding:12px 4px;background:none;border:none;color:#555;font-size:13px;
  font-weight:700;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tabs button.active{color:#fff;border-bottom-color:#4fc3f7}

/* ── MONEY FLOW BAR ── */
.flow-section{padding:12px 16px 4px}
.flow-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.flow-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.4;font-weight:600}
.flow-value{font-size:13px;font-weight:700}
.flow-bar{height:8px;border-radius:4px;background:#1a1a2a;overflow:hidden;position:relative}
.flow-fill{height:100%;border-radius:4px;transition:width .6s,background .4s;position:absolute;left:0;top:0}
.flow-labels{display:flex;justify-content:space-between;margin-top:4px}
.flow-labels span{font-size:10px;opacity:.3;font-weight:500}
.flow-meter{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.flow-pill{text-align:center;padding:8px 6px;border-radius:10px;background:#111520;border:1px solid #1a1f2e}
.flow-pill .fp-label{font-size:10px;opacity:.4;text-transform:uppercase;letter-spacing:.5px}
.flow-pill .fp-val{font-size:16px;font-weight:700;margin-top:2px}

/* ── SIGNAL FACTORS ── */
.cards{padding:10px 16px}
.card{background:#0d1017;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #141820}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.35;margin-bottom:10px;font-weight:600}
.indicator-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #111520}
.indicator-row:last-child{border:none}
.ind-name{font-size:14px;font-weight:500}
.ind-value{font-size:12px;opacity:.45;margin-left:auto;margin-right:12px;font-variant-numeric:tabular-nums}
.ind-signal{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;min-width:52px;text-align:center;letter-spacing:.5px}
.ind-signal.buy{background:#00e67618;color:#00e676}
.ind-signal.sell{background:#ff525218;color:#ff5252}
.ind-signal.neutral{background:#ffffff08;color:#555}
.ind-weight{font-size:10px;opacity:.2;margin-left:6px;font-weight:500}

/* ── SCORE BREAKDOWN ── */
.score-breakdown{display:flex;align-items:center;gap:10px;margin-top:8px}
.score-bar-track{flex:1;height:6px;border-radius:3px;background:#111520;overflow:hidden;position:relative}
.score-bar-buy{position:absolute;left:50%;height:100%;border-radius:0 3px 3px 0;background:#00e676;transition:width .5s}
.score-bar-sell{position:absolute;right:50%;height:100%;border-radius:3px 0 0 3px;background:#ff5252;transition:width .5s}
.score-label{font-size:11px;font-weight:700;min-width:35px;text-align:center}

/* ── OHLC ── */
.ohlc{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
.ohlc div{font-size:10px;opacity:.4;text-transform:uppercase;letter-spacing:.5px}
.ohlc span{display:block;font-size:15px;font-weight:700;opacity:1;margin-top:2px;font-variant-numeric:tabular-nums}

/* ── MULTI-TF OVERVIEW ── */
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 16px}
.ov-cell{background:#0d1017;border-radius:12px;padding:12px 8px;text-align:center;border:1px solid #141820;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s,border-color .2s,box-shadow .2s;
  user-select:none;-webkit-user-select:none}
.ov-cell:active{transform:scale(0.94)}
.ov-cell.active-tf{border-color:#4fc3f7 !important;box-shadow:0 0 12px #4fc3f722}
.ov-cell .ov-tf{font-size:11px;opacity:.4;font-weight:600;letter-spacing:1px}
.ov-cell .ov-pct{font-size:22px;font-weight:800;margin:4px 0}
.ov-cell .ov-dir{font-size:10px;font-weight:700;letter-spacing:1px}
.ov-cell.buy{border-color:#00e67633}.ov-cell.buy .ov-pct,.ov-cell.buy .ov-dir{color:#00e676}
.ov-cell.sell{border-color:#ff525233}.ov-cell.sell .ov-pct,.ov-cell.sell .ov-dir{color:#ff5252}
.ov-cell.neutral .ov-pct,.ov-cell.neutral .ov-dir{color:#666}

/* ── PRICE TARGETS ── */
.targets-card{background:#0d1017;border-radius:14px;padding:16px;margin:10px 16px;border:1px solid #141820}
.targets-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.targets-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.35;font-weight:600}
.targets-dir{font-size:11px;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:1px}
.targets-dir.buy{background:#00e67618;color:#00e676}
.targets-dir.sell{background:#ff525218;color:#ff5252}
.targets-dir.neutral{background:#ffffff08;color:#666}

.target-visual{position:relative;margin:0 0 8px;padding:0 4px}
.target-track{position:relative;height:120px;display:flex;flex-direction:column;justify-content:space-between;
  margin-left:90px;margin-right:14px}
.target-line{display:flex;align-items:center;gap:8px;position:relative;height:24px}
.target-label{font-size:10px;opacity:.35;text-transform:uppercase;letter-spacing:.5px;width:76px;text-align:right;
  position:absolute;left:-84px;font-weight:500}
.target-bar{flex:1;height:2px;border-radius:1px;position:relative}
.target-price{font-size:14px;font-weight:700;min-width:70px;text-align:right;font-variant-numeric:tabular-nums}
.target-pct{font-size:10px;opacity:.4;margin-left:4px;font-weight:500}

.target-line.high .target-bar{background:linear-gradient(90deg,#00e67600,#00e67666)}
.target-line.mid .target-bar{background:linear-gradient(90deg,#00e67600,#00e67633)}
.target-line.current .target-bar{background:#4fc3f7;height:3px;box-shadow:0 0 8px #4fc3f744}
.target-line.current .target-price{color:#4fc3f7}
.target-line.midlow .target-bar{background:linear-gradient(90deg,#ff525200,#ff525233)}
.target-line.low .target-bar{background:linear-gradient(90deg,#ff525200,#ff525266)}

.target-line.high .target-price{color:#00e676}
.target-line.mid .target-price{color:#69f0ae}
.target-line.midlow .target-price{color:#ff8a80}
.target-line.low .target-price{color:#ff5252}

.target-method{font-size:10px;opacity:.25;text-align:center;margin-top:8px;letter-spacing:.3px}

/* ── POTENTIAL GAIN/LOSS PILLS ── */
.potential-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.potential-pill{text-align:center;padding:10px 8px;border-radius:10px;border:1px solid #1a1f2e}
.potential-pill.gain{background:#00e67610;border-color:#00e67622}
.potential-pill.loss{background:#ff525210;border-color:#ff525222}
.potential-pill .pp-label{font-size:10px;opacity:.4;text-transform:uppercase;letter-spacing:.5px}
.potential-pill .pp-price{font-size:18px;font-weight:800;margin:3px 0 1px}
.potential-pill .pp-pct{font-size:12px;font-weight:600}
.potential-pill.gain .pp-price,.potential-pill.gain .pp-pct{color:#00e676}
.potential-pill.loss .pp-price,.potential-pill.loss .pp-pct{color:#ff5252}

.updated-footer{text-align:center;padding:12px;font-size:10px;opacity:.25;letter-spacing:.5px}
.loading{text-align:center;padding:60px 20px;opacity:.3;font-size:14px}
.error-msg{text-align:center;padding:20px;color:#ff5252;font-size:13px}
</style>

<!-- PREDICTION HUB -->
<div class="prediction-hub">
  <div class="symbol">Zcash ZEC / USDT</div>
  <div class="price-row">

    <div class="price-change up" id="change">--</div>

<!-- TREND WARNING -->

    <div class="warn-text" id="warnText"></div>

  </div>
</div>

<!-- TIMEFRAME TABS -->
<div class="tabs" id="tabs">
  <button data-tf="15m" class="active">15m</button>
  <button data-tf="1h">1H</button>
  <button data-tf="4h">4H</button>

  <button data-tf="1w">1W</button>
  <button data-tf="1M">1M</button>
</div>

<!-- MAIN CONTENT -->
<div id="content"><div class="loading">Fetching market data...</div></div>

<script>
// ════════════════════════════════════════════════
//  ZEC PREDICTION ENGINE
//  Composite scoring inspired by:
//  - Freqtrade FreqAI LSTM aggregate scoring
//  - Polymarket multi-model ensemble approach
//  - Money Flow Index (MFI) for smart money tracking
// ════════════════════════════════════════════════

const SYMBOL = 'ZECUSDT';
const TIMEFRAMES = ['15m','1h','4h','1d','1w','1M'];
const REFRESH_MS = { '15m':20000, '1h':45000, '4h':120000, '1d':300000, '1w':600000, '1M':600000 };
let activeTF = '15m';
let cache = {};
let prevPredictions = {};

// ── BINANCE API ──
async function fetchCandles(tf, limit=200) {
  const url = `https://api.binance.com/api/v3/klines?symbol=${SYMBOL}&interval=${tf}&limit=${limit}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`API ${r.status}`);
  return (await r.json()).map(c => ({
    time: c[0], open: +c[1], high: +c[2], low: +c[3], close: +c[4], volume: +c[5]
  }));
}

// ══════════════════════════
//  TECHNICAL INDICATORS
// ══════════════════════════

function ema(data, period) {
  const k = 2 / (period + 1), r = [data[0]];
  for (let i = 1; i < data.length; i++) r.push(data[i] * k + r[i-1] * (1 - k));
  return r;
}

function sma(data, period) {
  const r = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { r.push(null); continue; }
    let s = 0; for (let j = i - period + 1; j <= i; j++) s += data[j];
    r.push(s / period);
  }
  return r;
}

function calcRSI(closes, period=14) {
  const gains = [], losses = [];
  for (let i = 1; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    gains.push(d > 0 ? d : 0);
    losses.push(d < 0 ? -d : 0);
  }
  let ag = gains.slice(0, period).reduce((a,b)=>a+b,0) / period;
  let al = losses.slice(0, period).reduce((a,b)=>a+b,0) / period;
  const rsi = new Array(period).fill(null);
  rsi.push(al === 0 ? 100 : 100 - 100/(1+ag/al));
  for (let i = period; i < gains.length; i++) {
    ag = (ag * (period-1) + gains[i]) / period;
    al = (al * (period-1) + losses[i]) / period;
    rsi.push(al === 0 ? 100 : 100 - 100/(1+ag/al));
  }
  return rsi;
}

function calcMACD(closes) {
  const e12 = ema(closes, 12), e26 = ema(closes, 26);
  const ml = e12.map((v,i) => v - e26[i]);
  const sig = ema(ml, 9);
  return { macdLine: ml, signal: sig, histogram: ml.map((v,i) => v - sig[i]) };
}

function calcBB(closes, period=20, mult=2) {
  const mid = sma(closes, period), upper = [], lower = [];
  for (let i = 0; i < closes.length; i++) {
    if (mid[i] === null) { upper.push(null); lower.push(null); continue; }
    let s = 0; for (let j = i - period + 1; j <= i; j++) s += (closes[j] - mid[i]) ** 2;
    const std = Math.sqrt(s / period);
    upper.push(mid[i] + mult * std); lower.push(mid[i] - mult * std);
  }
  return { upper, mid, lower };
}

// ── MONEY FLOW INDEX (MFI) ── the key addition
function calcMFI(candles, period=14) {
  const tp = candles.map(c => (c.high + c.low + c.close) / 3);
  const rawFlow = tp.map((t, i) => t * candles[i].volume);
  const mfi = new Array(period + 1).fill(null);
  for (let i = period + 1; i < tp.length; i++) {
    let posFlow = 0, negFlow = 0;
    for (let j = i - period + 1; j <= i; j++) {
      if (tp[j] > tp[j-1]) posFlow += rawFlow[j];
      else if (tp[j] < tp[j-1]) negFlow += rawFlow[j];
    }
    const ratio = negFlow === 0 ? 100 : posFlow / negFlow;
    mfi.push(100 - (100 / (1 + ratio)));
  }
  return mfi;
}

// ── ON-BALANCE VOLUME (OBV) ──
function calcOBV(candles) {
  const obv = [0];
  for (let i = 1; i < candles.length; i++) {
    if (candles[i].close > candles[i-1].close) obv.push(obv[i-1] + candles[i].volume);
    else if (candles[i].close < candles[i-1].close) obv.push(obv[i-1] - candles[i].volume);
    else obv.push(obv[i-1]);
  }
  return obv;
}

// ── ADX (Average Directional Index) ──
function calcADX(candles, period=14) {
  if (candles.length < period * 2 + 1) return { adx: new Array(candles.length).fill(null), pdi: [], ndi: [] };
  const trList = [], dmPlus = [], dmMinus = [];
  for (let i = 1; i < candles.length; i++) {
    const h = candles[i].high, l = candles[i].low, pc = candles[i-1].close;
    trList.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
    const up = h - candles[i-1].high, dn = candles[i-1].low - l;
    dmPlus.push(up > dn && up > 0 ? up : 0);
    dmMinus.push(dn > up && dn > 0 ? dn : 0);
  }
  const smoothed = (arr) => {
    const r = [arr.slice(0, period).reduce((a,b)=>a+b,0)];
    for (let i = period; i < arr.length; i++) r.push(r[r.length-1] - r[r.length-1]/period + arr[i]);
    return r;
  };
  const sTR = smoothed(trList), sDMP = smoothed(dmPlus), sDMM = smoothed(dmMinus);
  const pdi = sTR.map((t,i) => t === 0 ? 0 : (sDMP[i] / t) * 100);
  const ndi = sTR.map((t,i) => t === 0 ? 0 : (sDMM[i] / t) * 100);
  const dx = pdi.map((p,i) => (p + ndi[i]) === 0 ? 0 : Math.abs(p - ndi[i]) / (p + ndi[i]) * 100);
  const adxSmoothed = [dx.slice(0, period).reduce((a,b)=>a+b,0) / period];
  for (let i = period; i < dx.length; i++) adxSmoothed.push((adxSmoothed[adxSmoothed.length-1] * (period-1) + dx[i]) / period);
  const pad = candles.length - adxSmoothed.length;
  return {
    adx: new Array(pad).fill(null).concat(adxSmoothed),
    pdi: new Array(pad).fill(null).concat(pdi),
    ndi: new Array(pad).fill(null).concat(ndi)
  };
}

// ── VWAP (Volume Weighted Average Price) ──
function calcVWAP(candles, lookback=20) {
  const end = candles.length;
  const start = Math.max(0, end - lookback);
  let cumTPV = 0, cumVol = 0;
  for (let i = start; i < end; i++) {
    const tp = (candles[i].high + candles[i].low + candles[i].close) / 3;
    cumTPV += tp * candles[i].volume;
    cumVol += candles[i].volume;
  }
  return cumVol === 0 ? candles[end-1].close : cumTPV / cumVol;
}

// ══════════════════════════════════════
//  PRICE TARGET ENGINE
//  Uses 4 methods: ATR, Fibonacci,
//  Support/Resistance, Bollinger Bands
// ══════════════════════════════════════

function calcPriceTargets(candles, currentPrice, direction, adxVal, bb, ema50) {
  const L = candles.length - 1;

  // 1. ATR-based targets (Average True Range)
  const atrPeriod = 14;
  let atrSum = 0;
  for (let i = Math.max(1, L - atrPeriod + 1); i <= L; i++) {
    const h = candles[i].high, l = candles[i].low, pc = candles[i-1].close;
    atrSum += Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
  }
  const atr = atrSum / atrPeriod;
  // Conservative: 1.5x ATR, Aggressive: 2.5x ATR
  const atrTargetUp1 = currentPrice + atr * 1.5;
  const atrTargetUp2 = currentPrice + atr * 2.5;
  const atrTargetDown1 = currentPrice - atr * 1.5;
  const atrTargetDown2 = currentPrice - atr * 2.5;

  // 2. Swing high/low Support & Resistance (last 50 candles)
  const lookback = Math.min(50, L);
  const recentCandles = candles.slice(L - lookback, L + 1);
  const swingHighs = [], swingLows = [];
  for (let i = 2; i < recentCandles.length - 2; i++) {
    const c = recentCandles[i];
    if (c.high > recentCandles[i-1].high && c.high > recentCandles[i-2].high &&
        c.high > recentCandles[i+1].high && c.high > recentCandles[i+2].high) {
      swingHighs.push(c.high);
    }
    if (c.low < recentCandles[i-1].low && c.low < recentCandles[i-2].low &&
        c.low < recentCandles[i+1].low && c.low < recentCandles[i+2].low) {
      swingLows.push(c.low);
    }
  }
  // Nearest resistance above price and support below price
  const resistances = swingHighs.filter(h => h > currentPrice).sort((a,b) => a - b);
  const supports = swingLows.filter(l => l < currentPrice).sort((a,b) => b - a);
  const nearestResistance = resistances[0] || currentPrice + atr * 2;
  const farResistance = resistances[1] || currentPrice + atr * 3;
  const nearestSupport = supports[0] || currentPrice - atr * 2;
  const farSupport = supports[1] || currentPrice - atr * 3;

  // 3. Fibonacci retracement/extension from recent swing
  const recentHigh = Math.max(...recentCandles.map(c => c.high));
  const recentLow = Math.min(...recentCandles.map(c => c.low));
  const fibRange = recentHigh - recentLow;
  // Fib extension levels
  const fib618up = currentPrice + fibRange * 0.618;
  const fib1up = currentPrice + fibRange * 1.0;
  const fib618down = currentPrice - fibRange * 0.618;
  const fib1down = currentPrice - fibRange * 1.0;
  // Fib retracement targets
  const fib382ret = recentHigh - fibRange * 0.382;
  const fib618ret = recentHigh - fibRange * 0.618;

  // 4. Bollinger Band targets
  const bbUpper = bb.upper[L] || currentPrice + atr;
  const bbLower = bb.lower[L] || currentPrice - atr;
  const bbMid = bb.mid[L] || currentPrice;

  // ── AGGREGATE: weighted average of methods ──
  // Confidence multiplier: stronger signal = extend targets further
  const strength = adxVal > 25 ? 1.2 : adxVal > 15 ? 1.0 : 0.8;

  let upTarget1, upTarget2, downTarget1, downTarget2;

  // Conservative target (closer): avg of nearest resistance, ATR 1.5x, Fib 0.618, BB upper
  upTarget1 = ((nearestResistance + atrTargetUp1 + fib618up + bbUpper) / 4) * (0.95 + strength * 0.05);
  // Aggressive target (further): avg of far resistance, ATR 2.5x, Fib 1.0
  upTarget2 = ((farResistance + atrTargetUp2 + fib1up) / 3) * (0.95 + strength * 0.05);

  // Conservative support: avg of nearest support, ATR 1.5x down, Fib 0.618 down, BB lower
  downTarget1 = ((nearestSupport + atrTargetDown1 + fib618down + bbLower) / 4) * (1.05 - strength * 0.05);
  // Aggressive support: avg of far support, ATR 2.5x down, Fib 1.0 down
  downTarget2 = ((farSupport + atrTargetDown2 + fib1down) / 3) * (1.05 - strength * 0.05);

  // Ensure logical ordering
  upTarget1 = Math.max(currentPrice * 1.002, upTarget1);
  upTarget2 = Math.max(upTarget1 * 1.005, upTarget2);
  downTarget1 = Math.min(currentPrice * 0.998, downTarget1);
  downTarget2 = Math.min(downTarget1 * 0.995, downTarget2);

  return {
    upTarget1: +upTarget1.toFixed(2),
    upTarget2: +upTarget2.toFixed(2),
    downTarget1: +downTarget1.toFixed(2),
    downTarget2: +downTarget2.toFixed(2),
    upPct1: +((upTarget1 - currentPrice) / currentPrice * 100).toFixed(2),
    upPct2: +((upTarget2 - currentPrice) / currentPrice * 100).toFixed(2),
    downPct1: +((downTarget1 - currentPrice) / currentPrice * 100).toFixed(2),
    downPct2: +((downTarget2 - currentPrice) / currentPrice * 100).toFixed(2),
    atr: +atr.toFixed(2),
    nearestResistance: +nearestResistance.toFixed(2),
    nearestSupport: +nearestSupport.toFixed(2)
  };
}

// ══════════════════════════════════════════
//  COMPOSITE PREDICTION ENGINE
//  Inspired by FreqAI aggregate scoring +
//  Polymarket ensemble weighted consensus
// ══════════════════════════════════════════

function analyze(candles) {
  const closes = candles.map(c => c.close);
  const volumes = candles.map(c => c.volume);
  const L = closes.length - 1;
  const price = closes[L];

  // ── Calculate all indicators ──
  const ema9 = ema(closes, 9), ema21 = ema(closes, 21), ema50 = ema(closes, 50);
  const rsi = calcRSI(closes);
  const rsiVal = rsi[rsi.length - 1] || 50;
  const macd = calcMACD(closes);
  const bb = calcBB(closes);
  const mfi = calcMFI(candles);
  const mfiVal = mfi[mfi.length - 1] || 50;
  const obv = calcOBV(candles);
  const obvSma = sma(obv, 20);
  const adxData = calcADX(candles);
  const adxVal = adxData.adx[L] || 20;
  const pdi = adxData.pdi[L] || 0;
  const ndi = adxData.ndi[L] || 0;
  const vwap = calcVWAP(candles);
  const volSma = sma(volumes, 20);

  // ── Normalize each indicator to [-1, +1] (FreqAI Z-score style) ──
  const factors = [];

  // 1. EMA TREND (weight: 15%)
  const emaSpread = (ema9[L] - ema21[L]) / ema21[L] * 100;
  const emaNorm = Math.max(-1, Math.min(1, emaSpread / 2));
  factors.push({ name: 'EMA Trend (9/21)', weight: 0.15, score: emaNorm,
    value: `${emaSpread >= 0 ? '+' : ''}${emaSpread.toFixed(2)}%`,
    signal: emaNorm > 0.1 ? 'buy' : emaNorm < -0.1 ? 'sell' : 'neutral' });

  // 2. MACD MOMENTUM (weight: 15%)
  const histNow = macd.histogram[L], histPrev = macd.histogram[L-1];
  const macdMomentum = histNow > 0 ? Math.min(1, histNow / Math.abs(macd.macdLine[L] || 1)) :
    Math.max(-1, histNow / Math.abs(macd.macdLine[L] || 1));
  const macdAccel = histNow - histPrev > 0 ? 0.15 : -0.15;
  const macdNorm = Math.max(-1, Math.min(1, macdMomentum + macdAccel));
  factors.push({ name: 'MACD Momentum', weight: 0.15, score: macdNorm,
    value: `H: ${histNow.toFixed(4)}`,
    signal: macdNorm > 0.1 ? 'buy' : macdNorm < -0.1 ? 'sell' : 'neutral' });

  // 3. RSI (weight: 12%)
  const rsiNorm = ((rsiVal - 50) / 50); // >50 = bullish
  const rsiClamped = Math.max(-1, Math.min(1, rsiNorm * 1.5));
  factors.push({ name: 'RSI (14)', weight: 0.12, score: rsiClamped,
    value: rsiVal.toFixed(1),
    signal: rsiVal < 35 ? 'buy' : rsiVal > 68 ? 'sell' : 'neutral' });

  // 4. MONEY FLOW INDEX (weight: 15%) ★ KEY ADDITION
  const mfiNorm = ((mfiVal - 50) / 50);
  const mfiClamped = Math.max(-1, Math.min(1, mfiNorm * 1.5));
  factors.push({ name: 'Money Flow (MFI)', weight: 0.15, score: mfiClamped,
    value: mfiVal.toFixed(1),
    signal: mfiVal < 25 ? 'buy' : mfiVal > 75 ? 'sell' : 'neutral' });

  // 5. OBV TREND (weight: 10%)
  const obvNow = obv[L], obvSmaVal = obvSma[L] || obvNow;
  const obvDelta = obvSmaVal === 0 ? 0 : (obvNow - obvSmaVal) / Math.abs(obvSmaVal);
  const obvNorm = Math.max(-1, Math.min(1, obvDelta * 5));
  factors.push({ name: 'OBV Trend', weight: 0.10, score: obvNorm,
    value: obvNow > obvSmaVal ? 'Accumulating' : 'Distributing',
    signal: obvNorm > 0.2 ? 'buy' : obvNorm < -0.2 ? 'sell' : 'neutral' });

  // 6. VOLUME SPIKE (weight: 8%)
  const volRatio = volSma[L] ? volumes[L] / volSma[L] : 1;
  const trendDir = ema9[L] > ema21[L] ? 1 : -1;
  const volScore = volRatio > 1.5 ? 0.8 * trendDir : volRatio > 1.2 ? 0.4 * trendDir : 0;
  factors.push({ name: 'Volume Pressure', weight: 0.08, score: volScore,
    value: `${volRatio.toFixed(1)}x avg`,
    signal: volScore > 0.2 ? 'buy' : volScore < -0.2 ? 'sell' : 'neutral' });

  // 7. BOLLINGER POSITION (weight: 10%)
  const bbMid = bb.mid[L], bbUp = bb.upper[L], bbLow = bb.lower[L];
  let bbNorm = 0;
  if (bbMid && bbUp && bbLow) {
    const bbWidth = bbUp - bbLow;
    bbNorm = bbWidth === 0 ? 0 : ((price - bbMid) / (bbWidth / 2));
    bbNorm = Math.max(-1, Math.min(1, -bbNorm * 0.8)); // mean reversion: near top = bearish
  }
  factors.push({ name: 'Bollinger Band', weight: 0.10, score: bbNorm,
    value: bbLow ? `$${bbLow.toFixed(2)} - $${bbUp.toFixed(2)}` : '--',
    signal: price <= bbLow * 1.01 ? 'buy' : price >= bbUp * 0.99 ? 'sell' : 'neutral' });

  // 8. ADX TREND STRENGTH (weight: 10%)
  const adxTrending = adxVal > 25;
  const adxDirection = pdi > ndi ? 1 : -1;
  const adxMultiplier = Math.min(adxVal / 30, 1.5);
  const adxScore = adxTrending ? adxDirection * adxMultiplier * 0.7 : 0;
  factors.push({ name: 'ADX Strength', weight: 0.10, score: Math.max(-1, Math.min(1, adxScore)),
    value: `${adxVal.toFixed(0)} ${adxTrending ? '(Trending)' : '(Ranging)'}`,
    signal: adxTrending && pdi > ndi ? 'buy' : adxTrending && ndi > pdi ? 'sell' : 'neutral' });

  // 9. VWAP POSITION (weight: 5%)
  const vwapDelta = (price - vwap) / vwap;
  const vwapNorm = Math.max(-1, Math.min(1, vwapDelta * 20));
  factors.push({ name: 'VWAP Position', weight: 0.05, score: vwapNorm,
    value: `$${vwap.toFixed(2)}`,
    signal: price > vwap * 1.005 ? 'buy' : price < vwap * 0.995 ? 'sell' : 'neutral' });

  // ══ COMPOSITE SCORE (Polymarket-style weighted aggregate) ══
  let rawScore = 0;
  for (const f of factors) rawScore += f.score * f.weight;
  // rawScore is in roughly [-1, +1]

  // Convert to 0-100% bullish scale
  let bullishPct = ((rawScore + 1) / 2) * 100;
  bullishPct = Math.max(2, Math.min(98, bullishPct));

  // Determine direction and DISPLAY confidence in that direction
  // So "66% SELL" means 66% confident it will go down (not 34% buy)
  let direction, dirClass, displayPct;
  if (bullishPct >= 58) {
    direction = 'BUY'; dirClass = 'buy';
    displayPct = bullishPct; // e.g., 78% BUY
  } else if (bullishPct <= 42) {
    direction = 'SELL'; dirClass = 'sell';
    displayPct = 100 - bullishPct; // flip: 34% bullish → 66% SELL confidence
  } else {
    direction = 'HOLD'; dirClass = 'neutral';
    displayPct = 50 + Math.abs(bullishPct - 50); // show how close to 50 (low conviction)
  }

  // ── TREND CHANGE WARNING DETECTION ──
  let warning = null;
  const emaCrossUp = ema9[L] > ema21[L] && ema9[L-1] <= ema21[L-1];
  const emaCrossDown = ema9[L] < ema21[L] && ema9[L-1] >= ema21[L-1];
  const macdCrossUp = histNow > 0 && histPrev <= 0;
  const macdCrossDown = histNow < 0 && histPrev >= 0;
  const mfiExtremeHigh = mfiVal > 82;
  const mfiExtremeLow = mfiVal < 18;
  const rsiExtremeHigh = rsiVal > 75;
  const rsiExtremeLow = rsiVal < 25;
  const bbSqueeze = bbUp && bbLow && ((bbUp - bbLow) / bbMid < 0.03);
  // MFI divergence: price making new high but MFI declining (bearish) or vice versa
  const recentHighs = closes.slice(-5);
  const recentMFI = mfi.slice(-5).filter(v => v !== null);
  const priceTrendUp = recentHighs[recentHighs.length-1] > recentHighs[0];
  const mfiTrendDown = recentMFI.length >= 2 && recentMFI[recentMFI.length-1] < recentMFI[0];
  const mfiTrendUp = recentMFI.length >= 2 && recentMFI[recentMFI.length-1] > recentMFI[0];
  const priceTrendDown = recentHighs[recentHighs.length-1] < recentHighs[0];
  const bearishDivergence = priceTrendUp && mfiTrendDown;
  const bullishDivergence = priceTrendDown && mfiTrendUp;

  if (bearishDivergence && (rsiExtremeHigh || mfiExtremeHigh)) {
    warning = { type: 'reversal-down', icon: '🔻',
      text: 'BEARISH DIVERGENCE — Smart money exiting',
      sub: `MFI falling while price rising. RSI: ${rsiVal.toFixed(0)}, MFI: ${mfiVal.toFixed(0)}` };
  } else if (bullishDivergence && (rsiExtremeLow || mfiExtremeLow)) {
    warning = { type: 'reversal-up', icon: '🔺',
      text: 'BULLISH DIVERGENCE — Smart money accumulating',
      sub: `MFI rising while price falling. RSI: ${rsiVal.toFixed(0)}, MFI: ${mfiVal.toFixed(0)}` };
  } else if (emaCrossUp || macdCrossUp) {
    warning = { type: 'reversal-up', icon: '🔺',
      text: `TREND SHIFT UP${emaCrossUp ? ' — EMA Cross' : ''}${macdCrossUp ? ' — MACD Cross' : ''}`,
      sub: 'Momentum flipping bullish. Watch for confirmation.' };
  } else if (emaCrossDown || macdCrossDown) {
    warning = { type: 'reversal-down', icon: '🔻',
      text: `TREND SHIFT DOWN${emaCrossDown ? ' — EMA Cross' : ''}${macdCrossDown ? ' — MACD Cross' : ''}`,
      sub: 'Momentum flipping bearish. Consider reducing exposure.' };
  } else if (mfiExtremeHigh) {
    warning = { type: 'reversal-down', icon: '⚠️',
      text: 'OVERBOUGHT — Money Flow extreme high',
      sub: `MFI at ${mfiVal.toFixed(0)} — usually precedes pullback` };
  } else if (mfiExtremeLow) {
    warning = { type: 'reversal-up', icon: '⚠️',
      text: 'OVERSOLD — Money Flow extreme low',
      sub: `MFI at ${mfiVal.toFixed(0)} — potential bounce incoming` };
  } else if (bbSqueeze) {
    warning = { type: '', icon: '💥',
      text: 'VOLATILITY SQUEEZE — Breakout imminent',
      sub: 'Bollinger Bands contracting. Big move expected soon.' };
  }

  // ══ PRICE TARGET CALCULATION ══
  // Uses 4 methods averaged: ATR projection, Fibonacci, Support/Resistance, Bollinger Bands
  const targets = calcPriceTargets(candles, price, direction, adxVal, bb, ema50);

  const c = candles[L];
  const prevClose = candles[Math.max(0, L-1)].close;

  return {
    price, direction, dirClass, displayPct, rawScore,
    factors, warning, targets,
    mfiVal, rsiVal, adxVal, obvTrend: obvNow > obvSmaVal ? 'up' : 'down',
    buyFactors: factors.filter(f => f.score > 0.1).length,
    sellFactors: factors.filter(f => f.score < -0.1).length,
    ohlc: { open: c.open, high: c.high, low: c.low, close: c.close },
    change: ((c.close - prevClose) / prevClose * 100)
  };
}

// ── MULTI-TIMEFRAME OVERVIEW (fetches all TFs) ──
async function fetchAllTFOverview() {
  const grid = document.createElement('div');
  grid.className = 'overview-grid';
  grid.id = 'overviewGrid';

  for (const tf of TIMEFRAMES) {
    const cell = document.createElement('div');
    cell.className = `ov-cell neutral${tf === activeTF ? ' active-tf' : ''}`;
    cell.dataset.tf = tf;
    cell.innerHTML = `<div class="ov-tf">${tf}</div><div class="ov-pct" style="color:#444">...</div><div class="ov-dir">--</div>`;
    grid.appendChild(cell);

    // Tap to switch timeframe
    cell.addEventListener('click', () => switchTimeframe(tf));

    // Fetch in background
    fetchCandles(tf, 200).then(candles => {
      const r = analyze(candles);
      cache[tf] = candles;
      cell.className = `ov-cell ${r.dirClass}${tf === activeTF ? ' active-tf' : ''}`;
      cell.innerHTML = `
        <div class="ov-tf">${tf}</div>
        <div class="ov-pct">${Math.round(r.displayPct)}%</div>
        <div class="ov-dir">${r.direction}</div>`;
    }).catch(() => {});
  }

  // Insert after warning bar
  const existing = document.getElementById('overviewGrid');
  if (existing) existing.replaceWith(grid);
  else document.getElementById('tabs').before(grid);
}

// ── REFRESH ──
async function refresh() {
  try {
    const candles = await fetchCandles(activeTF);
    cache[activeTF] = candles;
    const result = analyze(candles);

    // Store for comparison
    const prevPred = prevPredictions[activeTF];
    prevPredictions[activeTF] = result;

    render(result);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error-msg">Error: ${e.message}<br>Retrying...</div>`;
    setTimeout(refresh, 8000);
  }
}

function switchTimeframe(tf) {
  activeTF = tf;
  // Sync tab bar highlight
  document.querySelectorAll('.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tf === tf);
  });
  // Sync overview grid highlight
  document.querySelectorAll('.ov-cell').forEach(c => {
    c.classList.toggle('active-tf', c.dataset.tf === tf);
  });
  document.getElementById('content').innerHTML = '<div class="loading">Analyzing...</div>';
  refresh();
  startAutoRefresh();
}

document.getElementById('tabs').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  switchTimeframe(e.target.dataset.tf);
});

let timer;
function startAutoRefresh() {
  clearInterval(timer);
  timer = setInterval(refresh, REFRESH_MS[activeTF]);
}

// ── INIT ──
fetchAllTFOverview();
refresh().then(startAutoRefresh);

// Refresh overview every 2 minutes
setInterval(fetchAllTFOverview, 120000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { refresh(); startAutoRefresh(); fetchAllTFOverview(); }
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
